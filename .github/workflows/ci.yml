name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            hedwig-backend/package-lock.json
            hedwig-backend/web-app/package-lock.json

      # Backend typecheck
      - name: Install backend dependencies
        run: npm ci --include=dev --legacy-peer-deps
        working-directory: hedwig-backend

      - name: Backend typecheck
        run: npx tsc --noEmit
        working-directory: hedwig-backend

      # Frontend typecheck
      - name: Install frontend dependencies
        run: npm ci --include=dev --legacy-peer-deps
        working-directory: hedwig-backend/web-app

      - name: Frontend typecheck
        run: npx tsc --noEmit --skipLibCheck
        working-directory: hedwig-backend/web-app

  docker-build:
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t hedwig-backend:test .
